server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: match-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  threads:
    # JDK 21 Loom：gRPC handler / JDBC 阻塞自动 unmount，承载高并发 IO 等待
    virtual:
      enabled: true

  # Nacos 配置中心：现代写法用 spring.config.import 而非 bootstrap.yml
  # optional: 前缀表示 nacos 不可达时不阻塞启动（local 开发友好）
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml

  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:38.76.188.242:8848}
      username: ${NACOS_USER:nacos}
      password: ${NACOS_PASSWORD:}
      config:
        namespace: ${NACOS_NAMESPACE:youjianxin-dating-dev}
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
      discovery:
        namespace: ${NACOS_NAMESPACE:youjianxin-dating-dev}
        group: DEFAULT_GROUP
        register-enabled: true

  datasource:
    # 真实密码绝不入库，全部走 .env.deploy（gitignored）或 Nacos 注入。
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dating_chat}
    username: ${DB_USER:dating}
    password: ${DB_PASSWORD:dating}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    # 与其它服务共用 dating_chat 库，各自走独立 Flyway 历史表避免 V1 撞 checksum
    table: flyway_history_match

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      connect-timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

# net.devh grpc
# - server.port 9090：对外注册到 Nacos 的 gRPC 端口（与 HTTP 8080 独立）
# - client.*.address：经 Nacos discovery NameResolver 寻址下游，禁止写死 host:port
grpc:
  server:
    port: 9090
    in-process-name: match-server
  client:
    im-service:
      address: discovery:///im-service
      negotiation-type: plaintext
    user-service:
      address: discovery:///user-service
      negotiation-type: plaintext

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.dating.match.entity
  global-config:
    banner: false
    db-config:
      id-type: auto                       # bigserial 由 DB 自增
      table-underline: true               # 实体驼峰 → 表下划线
      logic-delete-field: deleted         # @TableLogic 默认字段名
      logic-not-delete-value: 'false'
      logic-delete-value: 'true'          # PG BOOLEAN
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: INFO
    com.dating.match: DEBUG
    com.dating.match.mapper: DEBUG     # MyBatis-Plus SQL 打印
    org.flywaydb: INFO
