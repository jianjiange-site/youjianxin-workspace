    root: INFO
    com.dating.post: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX,UTC} %-5level [%X{traceId:-},%X{userId:-}] %logger{36} - %msg%n"
