server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: post-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    banner-mode: log
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # ---- 持久层 ----
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: post-service-hikari
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 5000
      # 红线 5:连接 session 强制 UTC,与列 TIMESTAMPTZ 配套
      connection-init-sql: SET TIME ZONE 'UTC'

  data:
    redis:
      timeout: 3s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 服务独占 history 表,避免和别的服务的 flyway_history 撞
    table: flyway_history_post

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# gRPC server(net.devh:grpc-server-spring-boot-starter)
grpc:
  server:
    port: 9090
    # 开发期允许 plaintext,grpcurl 调试用
    enable-keep-alive: true
    keep-alive-time: 60s
    keep-alive-timeout: 20s
    permit-keep-alive-without-calls: true

# 应用级配置
app:
  cache:
    # student-dev-guide §6.2:学员每人按 `<拼音>-dating-<env>` 前缀隔离;环境变量可覆盖
    key-prefix: ${REDIS_KEY_PREFIX:youjianxin-dating-dev}
  snowflake:
    # 本机单实例固定 1;部署多实例时**每个实例必须不同**
    worker-id: ${SNOWFLAKE_WORKER_ID:1}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
