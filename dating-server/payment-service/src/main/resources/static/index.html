<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Dashboard — Payment Service</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== Layout ===== */
  .container {
    width: 100%;
    max-width: 960px;
    padding: 40px 24px 60px;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f5af19, #f12711);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 0.85rem;
    color: #888;
    letter-spacing: 0.5px;
  }

  /* ===== Search Bar ===== */
  .search-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 8px;
    backdrop-filter: blur(12px);
  }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 1rem;
    padding: 12px 16px;
  }
  .search-bar input::placeholder { color: #666; }
  .search-bar button {
    background: linear-gradient(135deg, #f5af19, #f12711);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .search-bar button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(245,175,25,0.4);
  }
  .search-bar button:active { transform: translateY(0); }
  .search-bar button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== Subscription Card ===== */
  .sub-card {
    background: linear-gradient(145deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: 20px;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
    backdrop-filter: blur(8px);
  }
  .sub-card .sub-icon { font-size: 2rem; margin-bottom: 2px; }
  .sub-card .sub-tier {
    font-size: 1.15rem;
    font-weight: 700;
    color: #c4b5fd;
  }
  .sub-card .sub-tier.free { color: #888; }
  .sub-card .sub-tier.weekly { color: #22c55e; }
  .sub-card .sub-tier.monthly { color: #3b82f6; }
  .sub-card .sub-tier.yearly { color: #f5af19; }
  .sub-card .sub-expires {
    font-size: 0.82rem;
    color: #777;
  }
  .sub-card .sub-expires .expired { color: #ef4444; }
  .sub-card .sub-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .sub-badge.active {
    background: rgba(34,197,94,0.15);
    color: #4ade80;
  }
  .sub-badge.inactive {
    background: rgba(255,255,255,0.06);
    color: #666;
  }

  /* ===== Dashboard Row (Balance + Subscription) ===== */
  .dashboard-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }
  .dashboard-row > * { flex: 1; min-width: 0; }
  .balance-card {
    background: linear-gradient(145deg, rgba(245,175,25,0.15), rgba(241,39,17,0.1));
    border: 1px solid rgba(245,175,25,0.2);
    border-radius: 20px;
    padding: 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(8px);
  }
  .balance-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(245,175,25,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  .balance-card .label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #999;
    margin-bottom: 12px;
    position: relative;
  }
  .balance-card .value {
    font-size: 2.8rem;
    font-weight: 800;
    color: #f5af19;
    position: relative;
    line-height: 1;
    margin-bottom: 4px;
  }
  .balance-card .coin-icon {
    font-size: 3rem;
    position: relative;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .balance-card .user-id-tag {
    font-size: 0.85rem;
    color: #777;
    position: relative;
    margin-top: 8px;
  }

  /* ===== Section Title ===== */
  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #ccc;
  }
  .section-title .icon { font-size: 1.3rem; }

  /* ===== Table ===== */
  .table-wrap {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead { background: rgba(255,255,255,0.04); }
  th {
    text-align: left;
    padding: 14px 20px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #777;
    font-weight: 600;
  }
  td {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
  }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-income {
    background: rgba(34,197,94,0.15);
    color: #4ade80;
  }
  .badge-expense {
    background: rgba(239,68,68,0.15);
    color: #f87171;
  }

  .amount-income  { color: #4ade80; }
  .amount-expense { color: #f87171; }

  .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 0.85rem; }

  /* ===== Pagination ===== */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .pagination button {
    background: rgba(255,255,255,0.06);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .pagination button:hover:not(:disabled) {
    background: rgba(245,175,25,0.15);
    color: #f5af19;
  }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  .pagination .page-info {
    font-size: 0.85rem;
    color: #888;
    min-width: 80px;
    text-align: center;
  }

  /* ===== States ===== */
  .state-empty, .state-loading, .state-error {
    text-align: center;
    padding: 60px 20px;
    color: #666;
  }
  .state-empty .icon, .state-error .icon { font-size: 3rem; margin-bottom: 12px; }
  .state-empty .msg, .state-error .msg { font-size: 0.95rem; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #f5af19;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ef4444;
    color: #fff;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 1000;
    animation: fadeInOut 3s ease forwards;
    pointer-events: none;
  }
  @keyframes fadeInOut {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-12px); }
    10%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ===== Action Bar ===== */
  .action-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }
  .action-btn {
    flex: 1;
    padding: 14px 0;
    border: none;
    border-radius: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }
  .action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-add {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    box-shadow: 0 2px 12px rgba(34,197,94,0.3);
  }
  .btn-add:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(34,197,94,0.45); }
  .btn-consume {
    background: linear-gradient(135deg, #f97316, #ea580c);
    box-shadow: 0 2px 12px rgba(249,115,22,0.3);
  }
  .btn-consume:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(249,115,22,0.45); }

  /* ===== Inline Form ===== */
  .inline-form {
    display: none;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 24px;
    align-items: center;
    flex-wrap: wrap;
    animation: slideDown 0.2s ease;
  }
  .inline-form.active { display: flex; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .inline-form input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    color: #fff;
    font-size: 0.9rem;
    outline: none;
    min-width: 120px;
  }
  .inline-form input::placeholder { color: #555; }
  .inline-form .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .inline-form .field-group label {
    font-size: 0.7rem;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-left: 2px;
  }
  .inline-form button {
    padding: 10px 22px;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    transition: opacity 0.15s;
  }
  .inline-form button:hover { opacity: 0.85; }
  .inline-form .btn-confirm {
    background: linear-gradient(135deg, #f5af19, #f12711);
  }
  .inline-form .btn-cancel {
    background: rgba(255,255,255,0.1);
    color: #999;
  }
  .inline-form button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ===== Toast variants ===== */
  .toast-success {
    background: linear-gradient(135deg, #22c55e, #16a34a);
  }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 900;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: linear-gradient(145deg, #1e1b3a, #2a2750);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px;
    width: 90%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h2 {
    font-size: 1.3rem;
    color: #f5af19;
    margin-bottom: 20px;
    text-align: center;
  }
  .modal .step-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #777;
    margin-bottom: 10px;
  }
  .modal .product-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .modal .product-option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .modal .product-option:hover {
    border-color: rgba(245,175,25,0.3);
    background: rgba(245,175,25,0.05);
  }
  .modal .product-option.selected {
    border-color: #f5af19;
    background: rgba(245,175,25,0.1);
  }
  .modal .product-option .coin-emoji { font-size: 1.8rem; }
  .modal .product-option .prod-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .modal .product-option .prod-name { font-weight: 600; color: #e0e0e0; }
  .modal .product-option .prod-price { font-size: 0.82rem; color: #888; }
  .modal .channel-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(59,130,246,0.12);
    color: #60a5fa;
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .modal .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .modal .modal-actions button {
    flex: 1;
    padding: 14px 0;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
    transition: opacity 0.15s;
  }
  .modal .modal-actions button:hover { opacity: 0.85; }
  .modal .modal-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
  .modal .btn-primary {
    background: linear-gradient(135deg, #f5af19, #f12711);
  }
  .modal .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #999;
  }
  .modal .pay-result {
    text-align: center;
    padding: 20px 0;
  }
  .modal .pay-result .big-icon { font-size: 3rem; margin-bottom: 12px; }
  .modal .pay-result p { color: #aaa; font-size: 0.9rem; line-height: 1.6; }
  .modal .pay-result .ext-id {
    display: block;
    font-family: monospace;
    font-size: 0.8rem;
    color: #666;
    margin-top: 8px;
    word-break: break-all;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .container { padding: 20px 16px 40px; }
    .dashboard-row { flex-direction: column; }
    .balance-card { padding: 28px 24px; }
    .balance-card .value { font-size: 2.5rem; }
    .search-bar { flex-direction: column; }
    .search-bar button { width: 100%; }
    .action-bar { flex-direction: column; }
    .action-btn { padding: 16px 0; }
    .inline-form { flex-direction: column; align-items: stretch; }
    .inline-form input { min-width: auto; }
    .modal { padding: 24px 20px; width: 95%; }
    th, td { padding: 10px 12px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="header">
    <h1>Coin Dashboard</h1>
    <p class="subtitle">Payment Service · 金币查询</p>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <input type="number" id="userIdInput" placeholder="输入 User ID 查询金币..." min="1" autofocus>
    <button id="searchBtn" onclick="doSearch()">查询</button>
  </div>

  <!-- Balance -->
  <div class="dashboard-row">
    <div class="balance-card" id="balanceCard" style="display:none">
      <div class="coin-icon">💴</div>
      <div class="label">金币余额</div>
      <div class="value" id="balanceValue">—</div>
      <div class="user-id-tag">User <span id="balanceUserId">—</span></div>
    </div>

    <!-- Subscription -->
    <div class="sub-card" id="subCard" style="display:none">
      <div class="sub-icon">👑</div>
      <div class="sub-info">
        <div class="sub-tier" id="subTier">免费用户</div>
        <div class="sub-expires" id="subExpires"></div>
      </div>
      <div class="sub-badge-wrap">
        <span class="sub-badge inactive" id="subBadge">未激活</span>
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="action-btn btn-add" onclick="openCoinForm('add')">＋ 增加金币</button>
    <button class="action-btn btn-consume" onclick="openCoinForm('consume')">－ 消耗金币</button>
    <button class="action-btn" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 2px 12px rgba(99,102,241,0.3);" onclick="openRecharge()">💰 充值</button>
  </div>

  <!-- Inline Form -->
  <div class="inline-form" id="coinForm">
    <div class="field-group">
      <label>金额</label>
      <input type="number" id="coinAmount" placeholder="100" min="1" autocomplete="off">
    </div>
    <div class="field-group">
      <label>原因</label>
      <input type="text" id="coinReason" placeholder="测试加币" autocomplete="off">
    </div>
    <button class="btn-confirm" id="coinConfirmBtn" onclick="submitCoinOp()">确认</button>
    <button class="btn-cancel" onclick="closeCoinForm()">取消</button>
  </div>

  <!-- Recharge Modal -->
  <div class="modal-overlay" id="rechargeModal">
    <div class="modal" id="rechargeContent">
      <!-- filled dynamically by JS -->
    </div>
  </div>

  <!-- Ledger -->
  <div class="section-title">
    <span class="icon">📋</span> 金币流水
  </div>

  <div class="table-wrap" id="ledgerArea">
    <!-- filled by JS -->
  </div>

</div>

<script>
const API = {
  balance:    '/v1/coins/balance',
  ledger:     '/v1/coins/ledger',
  addCoins:   '/v1/coins/add',
  consume:    '/v1/coins/consume',
  products:   '/v1/products',
  createOrder:'/v1/payments/orders',
  verifyOrder:'/v1/payments/verify',
  subscription:'/v1/subscription'
};

const PAGE_SIZE = 15;
let currentUserId = null;
let currentPage = 1;
let totalPages = 1;
let coinOpMode = null;  // 'add' | 'consume' | null
let recharge = { step: 'idle', products: [], selectedIdx: -1, orderId: '', extOrderId: '', coinAmount: 0, popupRef: null, pollTimer: null };

// ── helpers ──

function $(id) { return document.getElementById(id); }

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

function formatNumber(num) {
  return Number(num).toLocaleString('zh-CN');
}

function formatTime(protoTs) {
  if (!protoTs) return '—';
  // proto3 JSON serializes Timestamp as RFC 3339 string: "2026-05-19T02:07:07Z"
  const d = new Date(protoTs);
  if (isNaN(d.getTime())) return '—';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ── API calls ──

async function fetchBalance(userId) {
  const res = await fetch(API.balance, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: Number(userId) })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();  // { base:{code,message}, userId, balance }
}

async function fetchLedger(userId, page) {
  const res = await fetch(API.ledger, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: Number(userId), page, size: PAGE_SIZE })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();  // { base:{code,message}, entries:[], total }
}

async function fetchAddCoins(userId, amount, reason) {
  const res = await fetch(API.addCoins, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: Number(userId), amount: Number(amount), reason: reason || '' })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();  // { base:{code,message}, balance }
}

async function fetchConsumeCoins(userId, amount, reason) {
  const res = await fetch(API.consume, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: Number(userId), amount: Number(amount), reason: reason || '' })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();  // { base:{code,message}, balance }
}

async function fetchSubscription(userId) {
  const res = await fetch(API.subscription, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: Number(userId) })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── render ──

function renderBalance(data) {
  const card = $('balanceCard');
  if (data.base && data.base.code !== 0) {
    card.style.display = 'none';
    showToast(data.base.message || '查询失败');
    return;
  }
  card.style.display = 'block';
  $('balanceValue').textContent = formatNumber(data.balance || 0);
  $('balanceUserId').textContent = data.userId || currentUserId;
  $('actionBar').style.display = 'flex';
}

function renderSubscription(data) {
  const card = $('subCard');
  const rawSub = data.subscription || data;
  const tier = rawSub.tier || 'SUBSCRIPTION_TIER_FREE';
  const isActive = rawSub.isActive || false;
  const expiresAt = rawSub.expiresAt;

  card.style.display = 'block';

  var tierName, cssClass, icon;
  switch (tier) {
    case 'SUBSCRIPTION_TIER_WEEKLY':  tierName = '周卡会员'; cssClass = 'weekly';  icon = '🥈'; break;
    case 'SUBSCRIPTION_TIER_MONTHLY': tierName = '月卡会员'; cssClass = 'monthly'; icon = '🥇'; break;
    case 'SUBSCRIPTION_TIER_YEARLY':  tierName = '年卡会员'; cssClass = 'yearly';  icon = '💎'; break;
    default:                          tierName = '免费用户'; cssClass = 'free';    icon = '👤'; break;
  }

  $('subCard').querySelector('.sub-icon').textContent = icon;
  var tierEl = $('subTier');
  tierEl.textContent = tierName;
  tierEl.className = 'sub-tier ' + cssClass;

  var expiresEl = $('subExpires');
  var badgeEl = $('subBadge');
  if (isActive) {
    badgeEl.textContent = '已激活';
    badgeEl.className = 'sub-badge active';
    expiresEl.innerHTML = '到期时间：<span>' + formatTime(expiresAt) + '</span>';
    expiresEl.querySelector('span').style.color = '#aaa';
  } else if (tier !== 'SUBSCRIPTION_TIER_FREE') {
    badgeEl.textContent = '已过期';
    badgeEl.className = 'sub-badge inactive';
    if (expiresAt) {
      expiresEl.innerHTML = '已于 <span class="expired">' + formatTime(expiresAt) + '</span> 到期';
    } else {
      expiresEl.textContent = '';
    }
  } else {
    badgeEl.textContent = '免费档';
    badgeEl.className = 'sub-badge inactive';
    expiresEl.textContent = '';
  }
}

function renderLedger(data) {
  const area = $('ledgerArea');
  if (data.base && data.base.code !== 0) {
    area.innerHTML = `<div class="state-error"><div class="icon">⚠️</div><div class="msg">${data.base.message || '查询失败'}</div></div>`;
    return;
  }

  const entries = data.entries || [];
  const total = data.total || 0;
  totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

  let html = `
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>类型</th>
        <th>金额</th>
        <th>余额</th>
        <th>原因</th>
        <th>时间</th>
      </tr>
    </thead>
    <tbody>`;

  if (entries.length === 0) {
    html += `<tr><td colspan="6" style="text-align:center;padding:40px;color:#555;">暂无流水记录</td></tr>`;
  } else {
    entries.forEach(e => {
      const isIncome = e.type === 'INCOME';
      const badgeClass = isIncome ? 'badge-income' : 'badge-expense';
      const badgeLabel = isIncome ? '收入' : '支出';
      const amountClass = isIncome ? 'amount-income' : 'amount-expense';
      const amountPrefix = isIncome ? '+' : '-';
      html += `
      <tr>
        <td class="mono" style="color:#888">${e.id || '—'}</td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td class="${amountClass} mono">${amountPrefix}${formatNumber(e.amount || 0)}</td>
        <td class="mono">${formatNumber(e.balanceAfter || 0)}</td>
        <td style="color:#aaa;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.reason || ''}">${e.reason || '—'}</td>
        <td style="color:#777;font-size:0.82rem">${formatTime(e.createdAt)}</td>
      </tr>`;
    });
  }

  html += `</tbody></table>`;

  // Pagination
  html += `
  <div class="pagination">
    <button onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ 上一页</button>
    <span class="page-info">${currentPage} / ${totalPages}</span>
    <button onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页 ›</button>
  </div>`;

  area.innerHTML = html;
}

function showLoading() {
  $('ledgerArea').innerHTML = '<div class="state-loading"><div class="spinner"></div><p style="color:#888">加载中...</p></div>';
}

function showInit() {
  $('ledgerArea').innerHTML = `<div class="state-empty"><div class="icon">🔍</div><div class="msg">请输入 User ID 并点击「查询」</div></div>`;
}

// ── actions ──

async function doSearch() {
  const input = $('userIdInput');
  const btn = $('searchBtn');
  const userId = input.value.trim();

  if (!userId || Number(userId) <= 0) {
    showToast('请输入有效的 User ID');
    input.focus();
    return;
  }

  currentUserId = userId;
  currentPage = 1;
  btn.disabled = true;
  btn.textContent = '查询中...';
  showLoading();

  try {
    const [balance, ledger, subscription] = await Promise.all([
      fetchBalance(userId),
      fetchLedger(userId, 1),
      fetchSubscription(userId)
    ]);
    renderBalance(balance);
    renderLedger(ledger);
    renderSubscription(subscription);
  } catch (err) {
    console.error('Search error:', err);
    $('balanceCard').style.display = 'none';
    $('actionBar').style.display = 'none';
    closeCoinForm();
    $('ledgerArea').innerHTML = `<div class="state-error"><div class="icon">❌</div><div class="msg">请求失败：${err.message}</div></div>`;
    showToast('网络或服务异常，请确认后端已启动');
  } finally {
    btn.disabled = false;
    btn.textContent = '查询';
    input.focus();
    input.select();
  }
}

async function goPage(page) {
  if (page < 1 || page > totalPages || !currentUserId) return;
  currentPage = page;
  showLoading();
  try {
    const ledger = await fetchLedger(currentUserId, page);
    renderLedger(ledger);
  } catch (err) {
    showToast('翻页失败：' + err.message);
  }
}

// ── coin operations ──

function openCoinForm(mode) {
  coinOpMode = mode;
  const form = $('coinForm');
  form.classList.add('active');
  $('coinAmount').value = '';
  $('coinReason').value = '';
  $('coinAmount').focus();
}

function closeCoinForm() {
  coinOpMode = null;
  $('coinForm').classList.remove('active');
}

async function submitCoinOp() {
  if (!coinOpMode) return;

  const amountStr = $('coinAmount').value.trim();
  const reason = $('coinReason').value.trim();

  if (!amountStr || Number(amountStr) <= 0) {
    showToast('请输入有效金额');
    $('coinAmount').focus();
    return;
  }

  const btn = $('coinConfirmBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';

  try {
    let resp;
    if (coinOpMode === 'add') {
      resp = await fetchAddCoins(currentUserId, amountStr, reason);
    } else {
      resp = await fetchConsumeCoins(currentUserId, amountStr, reason);
    }

    if (resp.base && resp.base.code !== 0) {
      showToast(resp.base.message || '操作失败');
      return;
    }

    // Success — refresh balance and ledger
    closeCoinForm();
    showToastEx('操作成功', true);

    const balanceData = await fetchBalance(currentUserId);
    renderBalance(balanceData);

    currentPage = 1;
    const ledgerData = await fetchLedger(currentUserId, 1);
    renderLedger(ledgerData);
  } catch (err) {
    showToast('操作失败：' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '确认';
  }
}

function showToastEx(msg, isSuccess) {
  const el = document.createElement('div');
  el.className = 'toast' + (isSuccess ? ' toast-success' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ── refresh helper ──

async function refreshAll() {
  if (!currentUserId) return;
  showLoading();
  try {
    const [balance, ledger, subscription] = await Promise.all([
      fetchBalance(currentUserId),
      fetchLedger(currentUserId, currentPage),
      fetchSubscription(currentUserId)
    ]);
    renderBalance(balance);
    renderLedger(ledger);
    renderSubscription(subscription);
  } catch (err) {
    showToast('刷新失败：' + err.message);
  }
}

// ── recharge flow ──

async function openRecharge() {
  if (!currentUserId) { showToast('请先查询用户'); return; }
  recharge.step = 'select';
  recharge.products = [];
  recharge.selectedIdx = -1;
  recharge.orderId = '';
  recharge.extOrderId = '';
  recharge.coinAmount = 0;

  $('rechargeModal').classList.add('active');
  renderRechargeStep();

  try {
    const resp = await fetch(API.products + '?platform=web');
    const data = await resp.json();
    if (data.base && data.base.code === 0 && data.products) {
      recharge.products = data.products;
      renderRechargeStep();
    } else {
      $('rechargeContent').innerHTML = '<div style="text-align:center;padding:20px;color:#888;">加载商品失败</div>';
    }
  } catch (e) {
    $('rechargeContent').innerHTML = `<div style="text-align:center;padding:20px;color:#f87171;">请求失败：${e.message}</div>`;
  }
}

function renderRechargeStep() {
  const ct = $('rechargeContent');
  if (recharge.step === 'select') {
    let html = '<h2>💰 充值中心</h2><div class="step-label">选择商品</div><div class="product-list">';
    if (recharge.products.length === 0) {
      html += '<div class="state-loading"><div class="spinner"></div></div>';
    } else {
      recharge.products.forEach((p, i) => {
        const sel = i === recharge.selectedIdx ? ' selected' : '';
        const price = (Number(p.priceCent) / 100).toFixed(2);
        html += `<div class="product-option${sel}" onclick="selectProduct(${i})">
          <span class="coin-emoji">🪙</span>
          <div class="prod-info"><span class="prod-name">${p.title}</span><span class="prod-price">${price} ${p.currency}</span></div>
        </div>`;
      });
    }
    html += '</div><div class="step-label">支付渠道</div>';
    html += '<div class="channel-tag">🔵 PayPal</div>';
    html += '<div class="modal-actions">';
    html += `<button class="btn-primary" onclick="startPayPalPayment()" ${recharge.selectedIdx < 0 ? 'disabled' : ''}>去支付</button>`;
    html += '<button class="btn-secondary" onclick="closeRecharge()">取消</button>';
    html += '</div>';
    ct.innerHTML = html;
  } else if (recharge.step === 'paying') {
    ct.innerHTML = `<h2>⚡ 付款处理中</h2>
      <div class="pay-result">
        <div class="spinner" style="margin:0 auto 16px;"></div>
        <p>请在 PayPal 窗口中完成支付<br>支付完成后将自动验证</p>
        <span class="ext-id">订单号：${recharge.orderId}</span>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeRecharge()">取消</button>
      </div>`;
  } else if (recharge.step === 'success') {
    ct.innerHTML = `<h2>✅ 充值成功</h2>
      <div class="pay-result">
        <div class="big-icon">🎉</div>
        <p>已成功充值 <b>${recharge.products[recharge.selectedIdx]?.title || ''}</b></p>
        <span class="ext-id">交易号：${recharge.extOrderId}</span>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="closeRecharge()">完成</button>
      </div>`;
  }
}

function selectProduct(idx) {
  recharge.selectedIdx = idx;
  const p = recharge.products[idx];
  // Parse coin amount from title: "1000 金币" → 1000
  const match = p && p.title ? p.title.match(/(\d+)/) : null;
  recharge.coinAmount = match ? Number(match[1]) : 0;
  renderRechargeStep();
}

async function startPayPalPayment() {
  if (recharge.selectedIdx < 0) return;
  const p = recharge.products[recharge.selectedIdx];
  const returnUrl = window.location.origin + '/?paypal=done';
  const cancelUrl = window.location.origin + '/?paypal=cancel';

  try {
    const resp = await fetch(API.createOrder, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: Number(currentUserId),
        product_id: p.productId,
        payment_method: 'PAYPAL',
        currency: p.currency,
        platform: 'web',
        return_url: returnUrl,
        cancel_url: cancelUrl
      })
    });
    const data = await resp.json();

    if (data.base && data.base.code !== 0) {
      showToast(data.base.message || '创建订单失败');
      return;
    }

    recharge.orderId = data.orderId;
    recharge.extOrderId = data.extOrderId;

    if (data.checkoutUrl) {
      const popup = window.open(data.checkoutUrl, 'paypalWindow', 'width=500,height=700');
      recharge.popupRef = popup;
      // Start polling for completion
      clearInterval(recharge.pollTimer);
      recharge.pollTimer = setInterval(pollPayPalPopup, 1000);
    }

    recharge.step = 'paying';
    renderRechargeStep();
  } catch (e) {
    showToast('创建订单失败：' + e.message);
  }
}

function pollPayPalPopup() {
  const popup = recharge.popupRef;
  if (!popup || popup.closed) {
    // Popup was closed — user might have finished or cancelled
    clearInterval(recharge.pollTimer);
    recharge.pollTimer = null;
    // If we have an order, try to auto-verify
    if (recharge.extOrderId) {
      verifyPayment();
    }
    return;
  }

  try {
    const url = popup.location.href;
    if (url.includes('?paypal=done')) {
      // PayPal redirected back to our return_url — payment done
      popup.close();
      clearInterval(recharge.pollTimer);
      recharge.pollTimer = null;
      verifyPayment();
    } else if (url.includes('?paypal=cancel')) {
      // User cancelled
      popup.close();
      clearInterval(recharge.pollTimer);
      recharge.pollTimer = null;
      showToast('支付已取消');
    }
  } catch (e) {
    // Cross-origin — can't read URL until same-origin redirect
  }
}

async function verifyPayment() {
  if (!recharge.extOrderId) return;

  clearInterval(recharge.pollTimer);
  recharge.pollTimer = null;
  recharge.step = 'paying';
  renderRechargeStep();

  try {
    const resp = await fetch(API.verifyOrder, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        order_id: recharge.orderId,
        ext_order_id: recharge.extOrderId,
        payment_method: 'PAYPAL'
      })
    });
    const data = await resp.json();

    if (!data.base || data.base.code !== 0) {
      showToast(data.base?.message || '验证失败');
      return;
    }
    if (data.status !== 'PAID') {
      showToast('支付未完成，请先在 PayPal 中完成支付');
      return;
    }

    // Close popup if still open
    if (recharge.popupRef && !recharge.popupRef.closed) {
      recharge.popupRef.close();
    }

    recharge.step = 'success';
    renderRechargeStep();
    showToastEx('充值成功！' + recharge.coinAmount + ' 金币已到账', true);

    // Refresh dashboard
    const balanceData = await fetchBalance(currentUserId);
    renderBalance(balanceData);
    currentPage = 1;
    const ledgerData = await fetchLedger(currentUserId, 1);
    renderLedger(ledgerData);
    const subData = await fetchSubscription(currentUserId);
    renderSubscription(subData);
  } catch (e) {
    showToast('验证失败：' + e.message);
  }
}

function closeRecharge() {
  clearInterval(recharge.pollTimer);
  recharge.pollTimer = null;
  if (recharge.popupRef && !recharge.popupRef.closed) {
    recharge.popupRef.close();
  }
  recharge.popupRef = null;
  $('rechargeModal').classList.remove('active');
  recharge.step = 'idle';
}

// Close modal on overlay click
$('rechargeModal').addEventListener('click', function(e) {
  if (e.target === this) closeRecharge();
});

// ── init ──

$('userIdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// Auto-query default user on page load
$('userIdInput').value = '123';
showInit();

// Kick off search when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', doSearch);
} else {
  doSearch();
}
</script>

</body>
</html>
