syntax = "proto3";

import "google/protobuf/timestamp.proto";

option java_package = "com.dating.youjianxin.proto.payment";
option java_multiple_files = true;
option java_outer_classname = "PaymentProto";

// ==========================================
// 1. 基础公共结构
// ==========================================

message BaseResponse {
  int32 code = 1;
  string message = 2;
  map<string,string> extra = 3;
}

// ==========================================
// 2. 枚举定义
// ==========================================

enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  APPLE_PAY = 1;
  GOOGLE_PAY = 2;
  STRIPE = 3;
  PAYPAL = 4;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  PAID = 2;
  FAILED = 3;
  CANCELED = 4;
}

enum WithdrawStatus {
  WITHDRAW_STATUS_UNSPECIFIED = 0;
  WITHDRAW_PENDING = 1;
  WITHDRAW_SUCCESS = 2;
  WITHDRAW_REJECTED = 3;
}

enum WithdrawAccountType {
  WITHDRAW_ACCOUNT_TYPE_UNSPECIFIED = 0;
  BANK_CARD = 1;
  PAYPAL_ACCOUNT = 2;
}

// 订阅档位(服务于 match-service 的 GetQuota / FREE 配额判定 / SuperHi 赠送)
// 详见 dating-server/docs/match-service-prd-tech.md §3.1 配额表
enum SubscriptionTier {
  SUBSCRIPTION_TIER_UNSPECIFIED = 0;
  SUBSCRIPTION_TIER_FREE = 1;     // 普通(每日右划 5 / 卡片 50 / SuperHi 0)
  SUBSCRIPTION_TIER_WEEKLY = 2;   // 周度(10 / 80 / 0)
  SUBSCRIPTION_TIER_MONTHLY = 3;  // 月度(15 / 120 / 1)
  SUBSCRIPTION_TIER_YEARLY = 4;   // 年度(15 / 120 / 1)
}

// ==========================================
// 3. 接口消息定义
// ==========================================

// --- [接口 1]: 获取商品列表 ---
message GetProductsRequest {
  string platform = 1;
}

message ProductInfo {
  string product_id = 1;
  string title = 2;
  string description = 3;
  int64 price_cent = 4;
  string currency = 5;
  string apple_product_id = 6;
  string stripe_price_id = 7;
}

message GetProductsResponse {
  BaseResponse base = 1;
  repeated ProductInfo products = 2;
}

// --- [接口 2]: 创建支付订单 ---
message CreateOrderRequest {
  string product_id = 1;
  PaymentMethod payment_method = 2;
  string currency = 3;
  string platform = 4;
  uint64 user_id = 5;
}

message CreateOrderResponse {
  BaseResponse base = 1;
  string order_id = 2;
  OrderStatus status = 3;
  string client_secret = 4;
  string checkout_url = 5;
  string ext_order_id = 6;
}

// --- [接口 3]: IAP 票据校验 ---
message PaymentVerifyRequest {
  string order_id = 1;
  string receipt_data = 2;
  optional string signature = 3;
  string ext_order_id = 4;
  PaymentMethod payment_method = 5;
}

message PaymentVerifyResponse {
  BaseResponse base = 1;
  string order_id = 2;
  OrderStatus status = 3;
  string ext_order_id = 4;
}

// --- [接口 4]: Webhook 回调 ---
message WebhookRequest {
  string channel = 1;
  string event_type = 2;
  bytes raw_body = 3;
  map<string, string> headers = 4;
}

message WebhookResponse {
  BaseResponse base = 1;
}

// --- [接口 5]: 查询钱包余额 ---
message GetBalanceRequest {}

message GetBalanceResponse {
  BaseResponse base = 1;
  string currency = 2;
  int64 available_balance_cent = 3;
  int64 frozen_balance_cent = 4;
}

// --- [接口 6]: 绑定提现账户 ---
message BindAccountRequest {
  WithdrawAccountType type = 1;
  string account_identifier = 2;
  string holder_name = 3;
}

message BindAccountResponse {
  BaseResponse base = 1;
  string account_id = 2;
}

// --- [接口 7]: 发起提现申请 ---
message WithdrawRequest {
  int64 amount_cent = 1;
  string account_id = 2;
  string idempotency_key = 3;
}

message WithdrawResponse {
  BaseResponse base = 1;
  string withdraw_id = 2;
  WithdrawStatus status = 3;
  google.protobuf.Timestamp estimated_arrival_time = 4;
}

// --- [接口 8]: 查询历史记录 ---
message GetHistoryRequest {
  int32 page = 1;
  int32 size = 2;
  optional string type = 3;
}

message HistoryItem {
  string id = 1;
  int64 amount_cent = 2;
  string status = 3;
  string type = 4;
  google.protobuf.Timestamp create_time = 5;
}

message GetHistoryResponse {
  BaseResponse base = 1;
  repeated HistoryItem items = 2;
}

// --- [接口 9]: 查询用户当前订阅档位 + 到期时间 ---
// 服务于 match-service 的 GetQuota / 配额判定;无订阅记录或已过期返回 FREE
message GetSubscriptionRequest {
  int64 user_id = 1;
}

message SubscriptionInfo {
  // 当前生效的档位;无记录 / expires_at 过期 → FREE
  SubscriptionTier tier = 1;
  // 到期时间;FREE 时无意义(可填 0 或缺省)
  google.protobuf.Timestamp expires_at = 2;
  // tier != FREE 且 expires_at > now() 时为 true
  bool is_active = 3;
}

message GetSubscriptionResponse {
  BaseResponse base = 1;
  SubscriptionInfo subscription = 2;
}

// ==========================================
// 4. gRPC Service 定义
// ==========================================

service PaymentService {
  rpc GetProducts(GetProductsRequest) returns (GetProductsResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc VerifyPayment(PaymentVerifyRequest) returns (PaymentVerifyResponse);
  rpc HandleWebhook(WebhookRequest) returns (WebhookResponse);
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc BindWithdrawAccount(BindAccountRequest) returns (BindAccountResponse);
  rpc Withdraw(WithdrawRequest) returns (WithdrawResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  // 查询用户当前订阅档位 + 到期时间(match-service 接入 SubscriptionTier 与配额判定)
  rpc GetSubscription(GetSubscriptionRequest) returns (GetSubscriptionResponse);
}

// ==========================================
// 5. 金币模块
// ==========================================

// --- 查询金币余额 ---
message GetCoinsRequest {
  int64 user_id = 1;
}

message GetCoinsResponse {
  BaseResponse base = 1;
  int64 user_id = 2;
  int64 balance = 3;
}

// --- 查询金币流水 ---
message GetCoinLedgerRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 size = 3;
}

message CoinLedgerEntry {
  int64 id = 1;
  int64 user_id = 2;
  string type = 3;
  int64 amount = 4;
  int64 balance_after = 5;
  string reason = 6;
  map<string, string> extra = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetCoinLedgerResponse {
  BaseResponse base = 1;
  repeated CoinLedgerEntry entries = 2;
  int32 total = 3;
}

// --- 增加金币 ---
message AddCoinsRequest {
  int64 user_id = 1;
  int64 amount = 2;
  string reason = 3;
  map<string, string> extra = 4;
}

message AddCoinsResponse {
  BaseResponse base = 1;
  int64 balance = 2;
}

// --- 消耗金币 ---
message ConsumeCoinsRequest {
  int64 user_id = 1;
  int64 amount = 2;
  string reason = 3;
  map<string, string> extra = 4;
  // 幂等 key:同一(user_id, idempotency_key)只扣一次。
  // 调用方约定:match-service SuperHi 用 "superhi:" + client_request_id
  // 为空时不做幂等(向后兼容老调用方);非空走 unique 索引(coin_ledger.idempotency_key)
  string idempotency_key = 5;
}

message ConsumeCoinsResponse {
  BaseResponse base = 1;
  int64 balance = 2;
}

service CoinService {
  rpc GetCoins(GetCoinsRequest) returns (GetCoinsResponse);
  rpc GetCoinLedger(GetCoinLedgerRequest) returns (GetCoinLedgerResponse);
  rpc AddCoins(AddCoinsRequest) returns (AddCoinsResponse);
  rpc AddPaidCoins(AddCoinsRequest) returns (AddCoinsResponse);
  rpc ConsumeCoins(ConsumeCoinsRequest) returns (ConsumeCoinsResponse);
}
