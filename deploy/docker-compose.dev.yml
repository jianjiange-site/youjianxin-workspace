# 本机 dev 部署:workspace 根目录唯一 compose,跑本仓库所有学员服务
# 容器挂外部网络 dating-app(student-dev-guide §9.1);中间件全部走远端共享
# (38.76.188.242 / minio-api.jianjiange.site),容器内代码无感。
# 启动前:
#   docker network create dating-app    # 一次即可
#   cp deploy/.env.deploy.example deploy/.env.deploy && 填 NACOS_PASSWORD
#   docker compose -f deploy/docker-compose.dev.yml up -d --build

name: youjianxin-dating-dev

networks:
  default:
    external: true
    name: dating-app

services:
  post-service:
    container_name: youjianxin-dating-dev-post-service
    build:
      context: ../dating-server/post-service
      dockerfile: Dockerfile
    image: youjianxin-dating-dev-post-service:dev
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: UTC
      # 多实例部署时每个实例必须不同;单实例随便填 1
      SNOWFLAKE_WORKER_ID: ${SNOWFLAKE_WORKER_ID:-1}
      REDIS_KEY_PREFIX: youjianxin-dating-dev
    ports:
      - "8080:8080"   # actuator
      - "9090:9090"   # gRPC
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    container_name: youjianxin-dating-dev-user-service
    build:
      context: ../dating-server/user-service
      dockerfile: Dockerfile
    image: youjianxin-dating-dev-user-service:dev
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: UTC
      # 业务主键 envPrefix(dating-common BizIdGenerator);dev=1
      BIZID_ENV_PREFIX: 1
    ports:
      - "18080:8080"   # actuator(主机端口错开 post-service)
      - "19090:9090"   # gRPC
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  match-service:
    container_name: youjianxin-dating-dev-match-service
    build:
      context: ../dating-server/match-service
      dockerfile: Dockerfile
    image: youjianxin-dating-dev-match-service:dev
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: UTC
    ports:
      - "28080:8080"   # actuator
      - "29090:9090"   # gRPC
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mobile-gateway:
    container_name: youjianxin-dating-dev-mobile-gateway
    build:
      context: ../dating-server/mobile-gateway
      dockerfile: Dockerfile
    image: youjianxin-dating-dev-mobile-gateway:dev
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      TZ: UTC
    ports:
      - "38080:8080"   # 公网入口(BFF REST),错开其他服务
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
